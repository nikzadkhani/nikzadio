name: Trigger Spotify Tracker

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  trigger-route:
    runs-on: ubuntu-latest
    steps:
      - name: Call API Route
        run: |
          curl -X GET "${{ secrets.CRON_ENDPOINT }}" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
