name: Spotify Listening History Synchronizer

on:
  schedule:
    # Run every 10 minutes starting on the 6th minute
    - cron: "6,16,26,36,46,56 * * * *"
  # Allow manual trigger from the GitHub Actions tab for debugging
  workflow_dispatch:

jobs:
  sync_spotify:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel Serverless Sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          VERCEL_PRODUCTION_URL: ${{ secrets.VERCEL_PRODUCTION_URL }}
          URL: ${{ secrets.VERCEL_PRODUCTION_URL }}/api/cron/spotify
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$VERCEL_PRODUCTION_URL" ]; then
             echo "Missing required Gitub Secrets (CRON_SECRET or VERCEL_PRODUCTION_URL). Skipping execution."
             exit 1
          fi

          response=$(curl -s --location-trusted -w "\n%{http_code}" -X GET -H "Authorization: Bearer $CRON_SECRET" "$URL")
          body=$(echo "$response" | head -n -1)
          status_code=$(echo "$response" | tail -n 1)
          tracks_inserted=$(echo "$body" | jq -r '.tracksInserted // "unknown"')

          echo "Status Code: $status_code"
          echo "Songs synced: $tracks_inserted"

          if [ "$status_code" -ne 200 ]; then
            echo "::error:: Failed to sync Spotify history. Server responded with status code $status_code."
            exit 1
          fi
